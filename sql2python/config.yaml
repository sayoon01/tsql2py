# ============================================================
#  SQL → Python 변환기 설정
# ============================================================

gemma:
  model_name: "google/gemma-3-12b-it"
  load_in_4bit: true
  load_in_8bit: false
  temperature: 0.15
  top_p: 0.9
  max_new_tokens: 4096
  repetition_penalty: 1.1

qwen:
  model_name: "Qwen/Qwen2.5-Coder-14B-Instruct"
  load_in_4bit: true
  load_in_8bit: false
  temperature: 0.15
  top_p: 0.9
  max_new_tokens: 4096
  repetition_penalty: 1.1

glm:
  model_name: "THUDM/GLM-4.5-Air-12B"
  load_in_4bit: true
  load_in_8bit: false
  temperature: 0.15
  top_p: 0.9
  max_new_tokens: 4096
  repetition_penalty: 1.1

