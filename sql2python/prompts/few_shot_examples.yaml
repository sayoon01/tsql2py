examples:
- tag: simple_select
  sql: "CREATE PROCEDURE GetActiveUsers\n    @MinAge INT = 18,\n    @MaxResults INT = 100\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT TOP(@MaxResults) UserID, UserName, Email, Age\n    FROM Users\n    WHERE IsActive = 1 AND Age >= @MinAge\n    ORDER BY UserName;\nEND"
  python: "import pyodbc\nimport pandas as pd\n\n\ndef get_active_users(\n    conn_str: str,\n    min_age: int = 18,\n    max_results: int = 100,\n) -> pd.DataFrame:\n    \"\"\"활성 사용자 목록 조회\"\"\"\n\n    query = \"\"\"\n        SELECT TOP(?) UserID, UserName, Email, Age\n        FROM Users\n        WHERE IsActive = 1 AND Age >= ?\n        ORDER BY UserName\n    \"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        df = pd.read_sql(query, conn, params=[max_results, min_age])\n\n    return df"
- tag: simple_dml_update
  sql: "CREATE PROCEDURE [dbo].[UpdateBookTitle]\n    @Isbn   VARCHAR(13),\n    @Title  NVARCHAR(256)\nAS\nBEGIN\n    SET NOCOUNT ON;\n    UPDATE Books SET Title = @Title WHERE Isbn = @Isbn;\nEND"
  python: "import pyodbc\nfrom contextlib import closing\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass UpdateBookTitleResult:\n    updated: bool\n    error_message: str | None = None\n\n\ndef update_book_title(\n    conn_str: str,\n    isbn: str,\n    title: str,\n) -> UpdateBookTitleResult:\n    \"\"\"ISBN으로 도서 제목을 수정합니다.\"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        conn.autocommit = False\n        with closing(conn.cursor()) as cursor:\n            try:\n                cursor.execute(\n                    \"\"\"\n                    UPDATE Books\n                    SET Title = ?\n                    WHERE Isbn = ?\n                    \"\"\",\n                    title,\n                    isbn,\n                )\n                updated = cursor.rowcount > 0\n                conn.commit()\n                return UpdateBookTitleResult(\n                    updated=updated,\n                    error_message=None,\n                )\n            except Exception as e:\n                conn.rollback()\n                return UpdateBookTitleResult(\n                    updated=False,\n                    error_message=str(e),\n                )"
- tag: transaction
  sql: "CREATE PROCEDURE UpdateOrderStatus\n    @OrderID      INT,\n    @NewStatus    NVARCHAR(50),\n    @UpdatedBy    NVARCHAR(100),\n    @UpdatedCount INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    DECLARE @OldStatus NVARCHAR(50);\n\n    BEGIN TRY\n        BEGIN TRANSACTION;\n\n        -- 기존 상태 조회\n        SELECT @OldStatus = Status\n        FROM Orders\n        WHERE OrderID = @OrderID;\n\n        -- 주문이 없으면 예외 처리\n        IF @OldStatus IS NULL\n        BEGIN\n            RAISERROR('해당 OrderID의 주문이 존재하지 않습니다.', 16, 1);\n        END\n\n        -- 상태 업데이트\n        UPDATE Orders\n        SET Status       = @NewStatus,\n            ModifiedBy   = @UpdatedBy,\n            ModifiedDate = GETDATE()\n        WHERE OrderID = @OrderID;\n\n        SET @UpdatedCount = @@ROWCOUNT;\n\n        -- 감사 로그 기록\n        INSERT INTO OrderAuditLog\n            (OrderID, OldStatus, NewStatus, ChangedBy, ChangedDate)\n        VALUES\n            (@OrderID, @OldStatus, @NewStatus, @UpdatedBy, GETDATE());\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        IF @@TRANCOUNT > 0\n            ROLLBACK TRANSACTION;\n\n        DECLARE @ErrorMsg NVARCHAR(4000) = ERROR_MESSAGE();\n        RAISERROR(@ErrorMsg, 16, 1);\n    END CATCH\nEND"
  python: "import pyodbc\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass UpdateResult:\n    updated_count: int\n    success: bool\n    error_message: str | None = None\n\n\ndef update_order_status(\n    conn_str: str,\n    order_id: int,\n    new_status: str,\n    updated_by: str,\n) -> UpdateResult:\n    \"\"\"주문 상태를 변경하고 감사 로그를 기록합니다.\"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        conn.autocommit = False\n        cursor = conn.cursor()\n\n        try:\n            # 1. 기존 상태 조회\n            cursor.execute(\n                \"\"\"\n                SELECT Status\n                FROM Orders\n                WHERE OrderID = ?\n                \"\"\",\n                order_id,\n            )\n            row = cursor.fetchone()\n\n            if row is None:\n                raise ValueError(\"해당 OrderID의 주문이 존재하지 않습니다.\")\n\n            old_status = row[0]\n\n            # 2. 주문 상태 업데이트\n            cursor.execute(\n                \"\"\"\n                UPDATE Orders\n                SET Status = ?,\n                    ModifiedBy = ?,\n                    ModifiedDate = GETDATE()\n                WHERE OrderID = ?\n                \"\"\",\n                new_status,\n                updated_by,\n                order_id,\n            )\n            updated_count = cursor.rowcount\n\n            # 3. 감사 로그 기록\n            cursor.execute(\n                \"\"\"\n                INSERT INTO OrderAuditLog\n                    (OrderID, OldStatus, NewStatus, ChangedBy, ChangedDate)\n                VALUES (?, ?, ?, ?, GETDATE())\n                \"\"\",\n                order_id,\n                old_status,\n                new_status,\n                updated_by,\n            )\n\n            # 4. 커밋\n            conn.commit()\n\n            return UpdateResult(\n                updated_count=updated_count,\n                success=True,\n                error_message=None,\n            )\n\n        except Exception as e:\n            conn.rollback()\n            return UpdateResult(\n                updated_count=0,\n                success=False,\n                error_message=str(e),\n            )"
- tag: temp_table
  sql: "CREATE PROCEDURE ProcessMonthlyReport\n    @Year  INT,\n    @Month INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    CREATE TABLE #MonthlySales (\n        ProductID    INT,\n        ProductName  NVARCHAR(200),\n        TotalQty     INT,\n        TotalRevenue DECIMAL(18,2)\n    );\n\n    INSERT INTO #MonthlySales (ProductID, ProductName, TotalQty, TotalRevenue)\n    SELECT\n        p.ProductID,\n        p.ProductName,\n        SUM(od.Quantity) AS TotalQty,\n        SUM(od.Quantity * od.UnitPrice) AS TotalRevenue\n    FROM OrderDetails od\n    JOIN Orders o ON od.OrderID = o.OrderID\n    JOIN Products p ON od.ProductID = p.ProductID\n    WHERE YEAR(o.OrderDate) = @Year\n      AND MONTH(o.OrderDate) = @Month\n    GROUP BY p.ProductID, p.ProductName;\n\n    -- 커서 대신 일괄 업데이트\n    UPDATE p\n    SET p.IsPopular = 1,\n        p.LastPopularDate = GETDATE()\n    FROM Products p\n    JOIN #MonthlySales ms ON p.ProductID = ms.ProductID\n    WHERE ms.TotalQty > 100;\n\n    SELECT *\n    FROM #MonthlySales\n    ORDER BY TotalRevenue DESC;\n\n    DROP TABLE #MonthlySales;\nEND"
  python: "import pyodbc\nimport pandas as pd\n\n\ndef process_monthly_report(\n    conn_str: str,\n    year: int,\n    month: int,\n) -> pd.DataFrame:\n    \"\"\"월간 매출 리포트를 생성하고 인기 상품을 마킹합니다.\"\"\"\n    with pyodbc.connect(conn_str) as conn:\n        conn.autocommit = False\n        cursor = conn.cursor()\n\n        try:\n            # 1. 월간 매출 집계 조회\n            monthly_sales = pd.read_sql(\n                \"\"\"\n                SELECT\n                    p.ProductID,\n                    p.ProductName,\n                    SUM(od.Quantity) AS TotalQty,\n                    SUM(od.Quantity * od.UnitPrice) AS TotalRevenue\n                FROM OrderDetails od\n                JOIN Orders o ON od.OrderID = o.OrderID\n                JOIN Products p ON od.ProductID = p.ProductID\n                WHERE YEAR(o.OrderDate) = ? AND MONTH(o.OrderDate) = ?\n                GROUP BY p.ProductID, p.ProductName\n                ORDER BY TotalRevenue DESC\n                \"\"\",\n                conn,\n                params=[year, month],\n            )\n\n            # 2. 인기 상품 일괄 업데이트\n            popular_ids = monthly_sales.loc[\n                monthly_sales[\"TotalQty\"] > 100, \"ProductID\"\n            ].tolist()\n\n            if popular_ids:\n                placeholders = \",\".join(\"?\" for _ in popular_ids)\n                sql = f\"\"\"\n                    UPDATE Products\n                    SET IsPopular = 1,\n                        LastPopularDate = GETDATE()\n                    WHERE ProductID IN ({placeholders})\n                \"\"\"\n                cursor.execute(sql, popular_ids)\n\n            conn.commit()\n            return monthly_sales\n\n        except Exception:\n            conn.rollback()\n            raise"
- tag: dynamic_sql
  sql: "CREATE PROCEDURE SearchProducts\n    @Keyword    NVARCHAR(100) = NULL,\n    @CategoryID INT           = NULL,\n    @SortBy     NVARCHAR(50)  = N'ProductName',\n    @PageNum    INT           = 1,\n    @PageSize   INT           = 20,\n    @TotalCount INT           OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    -- 기본 검증\n    IF @PageNum < 1\n    BEGIN\n        RAISERROR(N'@PageNum은 1 이상이어야 합니다.', 16, 1);\n        RETURN;\n    END\n\n    IF @PageSize < 1\n    BEGIN\n        RAISERROR(N'@PageSize는 1 이상이어야 합니다.', 16, 1);\n        RETURN;\n    END\n\n    -- 정렬 컬럼 화이트리스트 검증\n    IF @SortBy NOT IN (N'ProductID', N'ProductName', N'Price', N'CategoryID')\n    BEGIN\n        RAISERROR(N'유효하지 않은 정렬 컬럼입니다.', 16, 1);\n        RETURN;\n    END\n\n    -- 빈 문자열이면 NULL처럼 처리\n    IF @Keyword = N''\n        SET @Keyword = NULL;\n\n    DECLARE @SQL NVARCHAR(MAX);\n\n    -- 총 건수 조회\n    SELECT @TotalCount = COUNT(*)\n    FROM Products\n    WHERE (@Keyword IS NULL OR ProductName LIKE N'%' + @Keyword + N'%')\n      AND (@CategoryID IS NULL OR CategoryID = @CategoryID);\n\n    -- 페이징 조회\n    SET @SQL = N'\n        SELECT ProductID, ProductName, Price, CategoryID\n        FROM Products\n        WHERE (@Keyword IS NULL OR ProductName LIKE N''%'' + @Keyword + N''%'')\n          AND (@CategoryID IS NULL OR CategoryID = @CategoryID)\n        ORDER BY ' + QUOTENAME(@SortBy) + N'\n        OFFSET @Offset ROWS FETCH NEXT @PageSize ROWS ONLY;';\n\n    EXEC sp_executesql\n        @SQL,\n        N'@Keyword NVARCHAR(100), @CategoryID INT, @Offset INT, @PageSize INT',\n        @Keyword = @Keyword,\n        @CategoryID = @CategoryID,\n        @Offset = (@PageNum - 1) * @PageSize,\n        @PageSize = @PageSize;\nEND"
  python: "import pyodbc\nimport pandas as pd\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass SearchResult:\n    data: pd.DataFrame\n    total_count: int\n    page_num: int\n    page_size: int\n\n    @property\n    def total_pages(self) -> int:\n        return -(-self.total_count // self.page_size)\n\n\ndef search_products(\n    conn_str: str,\n    keyword: str | None = None,\n    category_id: int | None = None,\n    sort_by: str = \"ProductName\",\n    page_num: int = 1,\n    page_size: int = 20,\n) -> SearchResult:\n    \"\"\"상품 검색 + 총 건수 + 페이징 결과 반환\"\"\"\n\n    # 1. 정렬 컬럼 화이트리스트 검증\n    allowed_sorts = {\"ProductID\", \"ProductName\", \"Price\", \"CategoryID\"}\n    if sort_by not in allowed_sorts:\n        raise ValueError(\n            f\"sort_by는 {sorted(allowed_sorts)} 중 하나여야 합니다.\"\n        )\n\n    # 2. 페이지 값 검증\n    if page_num < 1:\n        raise ValueError(\"page_num은 1 이상이어야 합니다.\")\n    if page_size < 1:\n        raise ValueError(\"page_size는 1 이상이어야 합니다.\")\n\n    # 3. 빈 문자열이면 None처럼 처리\n    if keyword == \"\":\n        keyword = None\n\n    conditions: list[str] = []\n    params: list[object] = []\n\n    if keyword is not None:\n        conditions.append(\"ProductName LIKE ?\")\n        params.append(f\"%{keyword}%\")\n\n    if category_id is not None:\n        conditions.append(\"CategoryID = ?\")\n        params.append(category_id)\n\n    where_clause = \" AND \".join(conditions) if conditions else \"1=1\"\n    offset = (page_num - 1) * page_size\n\n    count_sql = f\"\"\"\n        SELECT COUNT(*) AS cnt\n        FROM Products\n        WHERE {where_clause}\n    \"\"\"\n\n    data_sql = f\"\"\"\n        SELECT ProductID, ProductName, Price, CategoryID\n        FROM Products\n        WHERE {where_clause}\n        ORDER BY {sort_by}\n        OFFSET ? ROWS FETCH NEXT ? ROWS ONLY\n    \"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        count_df = pd.read_sql(count_sql, conn, params=params)\n        total_count = int(count_df.iloc[0][\"cnt\"])\n\n        data_df = pd.read_sql(\n            data_sql,\n            conn,\n            params=params + [offset, page_size],\n        )\n\n    return SearchResult(\n        data=data_df,\n        total_count=total_count,\n        page_num=page_num,\n        page_size=page_size,\n    )"
- tag: merge_upsert
  sql: "CREATE PROCEDURE UpsertCustomer\n    @CustomerID   INT,\n    @CustomerName NVARCHAR(200),\n    @Email        NVARCHAR(200),\n    @Phone        NVARCHAR(50)\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    BEGIN TRY\n        BEGIN TRANSACTION;\n\n        UPDATE Customers\n        SET CustomerName = @CustomerName,\n            Email        = @Email,\n            Phone        = @Phone,\n            ModifiedDate = GETDATE()\n        WHERE CustomerID = @CustomerID;\n\n        IF @@ROWCOUNT = 0\n        BEGIN\n            INSERT INTO Customers\n                (CustomerID, CustomerName, Email, Phone, CreatedDate)\n            VALUES\n                (@CustomerID, @CustomerName, @Email, @Phone, GETDATE());\n        END\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        IF @@TRANCOUNT > 0\n            ROLLBACK TRANSACTION;\n\n        DECLARE @ErrorMsg NVARCHAR(4000) = ERROR_MESSAGE();\n        RAISERROR(@ErrorMsg, 16, 1);\n    END CATCH\nEND"
  python: "import pyodbc\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass UpsertResult:\n    action: str\n    success: bool\n    error_message: str | None = None\n\n\ndef upsert_customer(\n    conn_str: str,\n    customer_id: int,\n    customer_name: str,\n    email: str,\n    phone: str,\n) -> UpsertResult:\n    \"\"\"고객 정보를 UPSERT(있으면 수정, 없으면 삽입)합니다.\"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        conn.autocommit = False\n        cursor = conn.cursor()\n\n        try:\n            cursor.execute(\n                \"\"\"\n                UPDATE Customers\n                SET CustomerName = ?,\n                    Email        = ?,\n                    Phone        = ?,\n                    ModifiedDate = GETDATE()\n                WHERE CustomerID = ?\n                \"\"\",\n                customer_name,\n                email,\n                phone,\n                customer_id,\n            )\n\n            if cursor.rowcount > 0:\n                conn.commit()\n                return UpsertResult(action=\"updated\", success=True)\n\n            cursor.execute(\n                \"\"\"\n                INSERT INTO Customers\n                    (CustomerID, CustomerName, Email, Phone, CreatedDate)\n                VALUES (?, ?, ?, ?, GETDATE())\n                \"\"\",\n                customer_id,\n                customer_name,\n                email,\n                phone,\n            )\n\n            conn.commit()\n            return UpsertResult(action=\"inserted\", success=True)\n\n        except Exception as e:\n            conn.rollback()\n            return UpsertResult(\n                action=\"\",\n                success=False,\n                error_message=str(e),\n            )"
- tag: soft_delete
  sql: "CREATE PROCEDURE SoftDeleteProduct\n    @ProductID    INT,\n    @DeletedBy    NVARCHAR(100),\n    @DeletedCount INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    BEGIN TRY\n        BEGIN TRANSACTION;\n\n        UPDATE Products\n        SET IsDeleted   = 1,\n            DeletedBy   = @DeletedBy,\n            DeletedDate = GETDATE()\n        WHERE ProductID = @ProductID\n          AND IsDeleted = 0;\n\n        SET @DeletedCount = @@ROWCOUNT;\n\n        IF @DeletedCount = 0\n        BEGIN\n            RAISERROR(N'삭제 가능한 상품이 존재하지 않습니다.', 16, 1);\n        END\n\n        INSERT INTO ProductDeleteLog\n            (ProductID, DeletedBy, DeletedDate)\n        VALUES\n            (@ProductID, @DeletedBy, GETDATE());\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        IF @@TRANCOUNT > 0\n            ROLLBACK TRANSACTION;\n\n        DECLARE @ErrorMsg NVARCHAR(4000) = ERROR_MESSAGE();\n        RAISERROR(@ErrorMsg, 16, 1);\n    END CATCH\nEND"
  python: "import pyodbc\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass SoftDeleteResult:\n    deleted_count: int\n    success: bool\n    error_message: str | None = None\n\n\ndef soft_delete_product(\n    conn_str: str,\n    product_id: int,\n    deleted_by: str,\n) -> SoftDeleteResult:\n    \"\"\"상품을 soft delete 처리하고 삭제 이력을 남깁니다.\"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        conn.autocommit = False\n        cursor = conn.cursor()\n\n        try:\n            cursor.execute(\n                \"\"\"\n                UPDATE Products\n                SET IsDeleted = 1,\n                    DeletedBy = ?,\n                    DeletedDate = GETDATE()\n                WHERE ProductID = ?\n                  AND IsDeleted = 0\n                \"\"\",\n                deleted_by,\n                product_id,\n            )\n            deleted_count = cursor.rowcount\n\n            if deleted_count == 0:\n                raise ValueError(\"삭제 가능한 상품이 존재하지 않습니다.\")\n\n            cursor.execute(\n                \"\"\"\n                INSERT INTO ProductDeleteLog\n                    (ProductID, DeletedBy, DeletedDate)\n                VALUES (?, ?, GETDATE())\n                \"\"\",\n                product_id,\n                deleted_by,\n            )\n\n            conn.commit()\n            return SoftDeleteResult(\n                deleted_count=deleted_count,\n                success=True,\n                error_message=None,\n            )\n\n        except Exception as e:\n            conn.rollback()\n            return SoftDeleteResult(\n                deleted_count=0,\n                success=False,\n                error_message=str(e),\n            )"
- tag: bulk_insert
  sql: "CREATE PROCEDURE BulkInsertTags\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    INSERT INTO Tags (TagName, CreatedDate)\n    SELECT TagName, GETDATE()\n    FROM StagingTags\n    WHERE NOT EXISTS (\n        SELECT 1\n        FROM Tags t\n        WHERE t.TagName = StagingTags.TagName\n    );\n\n    SELECT @@ROWCOUNT AS InsertedCount;\nEND"
  python: "import pyodbc\nfrom dataclasses import dataclass\nfrom typing import Sequence\n\n\n@dataclass\nclass BulkInsertResult:\n    inserted_count: int\n    success: bool\n    error_message: str | None = None\n\n\ndef bulk_insert_tags(\n    conn_str: str,\n    tag_names: Sequence[str],\n) -> BulkInsertResult:\n    \"\"\"태그 목록을 중복 제외 후 일괄 등록합니다.\"\"\"\n\n    if not tag_names:\n        return BulkInsertResult(inserted_count=0, success=True)\n\n    unique_tag_names = list(dict.fromkeys(tag_names))\n\n    with pyodbc.connect(conn_str) as conn:\n        conn.autocommit = False\n        cursor = conn.cursor()\n\n        try:\n            cursor.fast_executemany = True\n\n            cursor.execute(\"SELECT TagName FROM Tags\")\n            existing = {row[0] for row in cursor.fetchall()}\n\n            rows_to_insert = [\n                (tag_name,)\n                for tag_name in unique_tag_names\n                if tag_name not in existing\n            ]\n\n            if not rows_to_insert:\n                conn.commit()\n                return BulkInsertResult(inserted_count=0, success=True)\n\n            cursor.executemany(\n                \"\"\"\n                INSERT INTO Tags (TagName, CreatedDate)\n                VALUES (?, GETDATE())\n                \"\"\",\n                rows_to_insert,\n            )\n\n            conn.commit()\n            return BulkInsertResult(\n                inserted_count=len(rows_to_insert),\n                success=True,\n            )\n\n        except Exception as e:\n            conn.rollback()\n            return BulkInsertResult(\n                inserted_count=0,\n                success=False,\n                error_message=str(e),\n            )"
- tag: scalar_aggregate
  sql: "CREATE PROCEDURE GetCustomerOrderSummary\n    @CustomerID     INT,\n    @TotalOrders    INT OUTPUT,\n    @TotalAmount    DECIMAL(18,2) OUTPUT,\n    @LastOrderDate  DATETIME OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        @TotalOrders = COUNT(*),\n        @TotalAmount = ISNULL(SUM(TotalAmount), 0),\n        @LastOrderDate = MAX(OrderDate)\n    FROM Orders\n    WHERE CustomerID = @CustomerID;\nEND"
  python: "import pyodbc\nfrom dataclasses import dataclass\nfrom datetime import datetime\n\n\n@dataclass\nclass CustomerOrderSummary:\n    total_orders: int\n    total_amount: float\n    last_order_date: datetime | None\n\n\ndef get_customer_order_summary(\n    conn_str: str,\n    customer_id: int,\n) -> CustomerOrderSummary:\n    \"\"\"고객의 주문 집계 정보를 반환합니다.\"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        cursor = conn.cursor()\n        cursor.execute(\n            \"\"\"\n            SELECT\n                COUNT(*) AS TotalOrders,\n                ISNULL(SUM(TotalAmount), 0) AS TotalAmount,\n                MAX(OrderDate) AS LastOrderDate\n            FROM Orders\n            WHERE CustomerID = ?\n            \"\"\",\n            customer_id,\n        )\n        row = cursor.fetchone()\n\n    return CustomerOrderSummary(\n        total_orders=int(row[0]),\n        total_amount=float(row[1]),\n        last_order_date=row[2],\n    )"
- tag: multiple_resultset
  sql: "CREATE PROCEDURE GetDashboardData\n    @CustomerID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    -- 결과셋 1: 고객 기본 정보\n    SELECT\n        CustomerID,\n        CustomerName,\n        Email\n    FROM Customers\n    WHERE CustomerID = @CustomerID;\n\n    -- 결과셋 2: 최근 주문 5건\n    SELECT TOP (5)\n        OrderID,\n        OrderDate,\n        TotalAmount,\n        Status\n    FROM Orders\n    WHERE CustomerID = @CustomerID\n    ORDER BY OrderDate DESC;\nEND"
  python: "import pyodbc\nimport pandas as pd\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass DashboardData:\n    customer: pd.DataFrame\n    recent_orders: pd.DataFrame\n\n\ndef get_dashboard_data(\n    conn_str: str,\n    customer_id: int,\n) -> DashboardData:\n    \"\"\"고객 정보와 최근 주문 목록을 함께 반환합니다.\"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        cursor = conn.cursor()\n        cursor.execute(\n            \"\"\"\n            SELECT\n                CustomerID,\n                CustomerName,\n                Email\n            FROM Customers\n            WHERE CustomerID = ?;\n\n            SELECT TOP (5)\n                OrderID,\n                OrderDate,\n                TotalAmount,\n                Status\n            FROM Orders\n            WHERE CustomerID = ?\n            ORDER BY OrderDate DESC;\n            \"\"\",\n            customer_id,\n            customer_id,\n        )\n\n        customer_rows = cursor.fetchall()\n        customer_columns = [col[0] for col in cursor.description]\n        customer_df = pd.DataFrame.from_records(\n            customer_rows,\n            columns=customer_columns,\n        )\n\n        cursor.nextset()\n\n        recent_order_rows = cursor.fetchall()\n        recent_order_columns = [col[0] for col in cursor.description]\n        recent_orders_df = pd.DataFrame.from_records(\n            recent_order_rows,\n            columns=recent_order_columns,\n        )\n\n    return DashboardData(\n        customer=customer_df,\n        recent_orders=recent_orders_df,\n    )"
- tag: cte_ranking
  sql: "CREATE PROCEDURE GetTopProductsByCategory\n    @CategoryID INT,\n    @TopN       INT = 3\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    ;WITH RankedProducts AS (\n        SELECT\n            p.ProductID,\n            p.ProductName,\n            SUM(od.Quantity) AS TotalQty,\n            ROW_NUMBER() OVER (\n                ORDER BY SUM(od.Quantity) DESC, p.ProductName ASC\n            ) AS RowNum\n        FROM Products p\n        JOIN OrderDetails od ON p.ProductID = od.ProductID\n        WHERE p.CategoryID = @CategoryID\n        GROUP BY p.ProductID, p.ProductName\n    )\n    SELECT\n        ProductID,\n        ProductName,\n        TotalQty\n    FROM RankedProducts\n    WHERE RowNum <= @TopN\n    ORDER BY RowNum;\nEND"
  python: "import pyodbc\nimport pandas as pd\n\n\ndef get_top_products_by_category(\n    conn_str: str,\n    category_id: int,\n    top_n: int = 3,\n) -> pd.DataFrame:\n    \"\"\"카테고리별 판매량 상위 상품을 조회합니다.\"\"\"\n\n    query = \"\"\"\n        WITH RankedProducts AS (\n            SELECT\n                p.ProductID,\n                p.ProductName,\n                SUM(od.Quantity) AS TotalQty,\n                ROW_NUMBER() OVER (\n                    ORDER BY SUM(od.Quantity) DESC, p.ProductName ASC\n                ) AS RowNum\n            FROM Products p\n            JOIN OrderDetails od ON p.ProductID = od.ProductID\n            WHERE p.CategoryID = ?\n            GROUP BY p.ProductID, p.ProductName\n        )\n        SELECT\n            ProductID,\n            ProductName,\n            TotalQty\n        FROM RankedProducts\n        WHERE RowNum <= ?\n        ORDER BY RowNum\n    \"\"\"\n\n    with pyodbc.connect(conn_str) as conn:\n        df = pd.read_sql(query, conn, params=[category_id, top_n])\n\n    return df"
