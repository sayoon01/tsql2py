  - tag: merge_upsert_fixed_datetime
    sql: |
      CREATE PROCEDURE UpsertCustomer
          @CustomerID INT,
          @CustomerName NVARCHAR(200),
          @Email NVARCHAR(200),
          @Phone NVARCHAR(50)
      AS
      BEGIN
          SET NOCOUNT ON;
          BEGIN TRY
              BEGIN TRANSACTION;
              UPDATE Customers
              SET CustomerName = @CustomerName,
                  Email = @Email,
                  Phone = @Phone,
                  ModifiedDate = GETDATE()
              WHERE CustomerID = @CustomerID;
              IF @@ROWCOUNT = 0
              BEGIN
                  INSERT INTO Customers
                      (CustomerID, CustomerName, Email, Phone, CreatedDate)
                  VALUES
                      (@CustomerID, @CustomerName, @Email, @Phone, GETDATE());
              END
              COMMIT TRANSACTION;
          END TRY
          BEGIN CATCH
              IF @@TRANCOUNT > 0
                  ROLLBACK TRANSACTION;
              DECLARE @ErrorMsg NVARCHAR(4000) = ERROR_MESSAGE();
              RAISERROR(@ErrorMsg, 16, 1);
          END CATCH
      END
    python: |
      import pyodbc
      from dataclasses import dataclass
      from datetime import datetime


      @dataclass
      class UpsertResult:
          action: str
          success: bool
          error_message: str | None = None


      def upsert_customer(
          conn_str: str,
          customer_id: int,
          customer_name: str,
          email: str,
          phone: str,
      ) -> UpsertResult:
          """고객 정보를 UPSERT(있으면 수정, 없으면 삽입)합니다."""

          with pyodbc.connect(conn_str) as conn:
              conn.autocommit = False
              cursor = conn.cursor()

              try:
                  now = datetime.now()

                  cursor.execute(
                      """
                      UPDATE Customers
                      SET CustomerName = ?,
                          Email = ?,
                          Phone = ?,
                          ModifiedDate = ?
                      WHERE CustomerID = ?
                      """,
                      customer_name,
                      email,
                      phone,
                      now,
                      customer_id,
                  )

                  if cursor.rowcount > 0:
                      conn.commit()
                      return UpsertResult(action="updated", success=True)

                  cursor.execute(
                      """
                      INSERT INTO Customers
                          (CustomerID, CustomerName, Email, Phone, CreatedDate)
                      VALUES (?, ?, ?, ?, ?)
                      """,
                      customer_id,
                      customer_name,
                      email,
                      phone,
                      now,
                  )

                  conn.commit()
                  return UpsertResult(action="inserted", success=True)

              except Exception as e:
                  conn.rollback()
                  return UpsertResult(
                      action="",
                      success=False,
                      error_message=str(e),
                  )

  - tag: soft_delete_fixed_datetime
    sql: |
      CREATE PROCEDURE SoftDeleteProduct
          @ProductID INT,
          @DeletedBy NVARCHAR(100),
          @DeletedCount INT OUTPUT
      AS
      BEGIN
          SET NOCOUNT ON;
          BEGIN TRY
              BEGIN TRANSACTION;
              UPDATE Products
              SET IsDeleted = 1,
                  DeletedBy = @DeletedBy,
                  DeletedDate = GETDATE()
              WHERE ProductID = @ProductID
                AND IsDeleted = 0;
              SET @DeletedCount = @@ROWCOUNT;
              IF @DeletedCount = 0
              BEGIN
                  RAISERROR(N'삭제 가능한 상품이 존재하지 않습니다.', 16, 1);
              END
              INSERT INTO ProductDeleteLog
                  (ProductID, DeletedBy, DeletedDate)
              VALUES
                  (@ProductID, @DeletedBy, GETDATE());
              COMMIT TRANSACTION;
          END TRY
          BEGIN CATCH
              IF @@TRANCOUNT > 0
                  ROLLBACK TRANSACTION;
              DECLARE @ErrorMsg NVARCHAR(4000) = ERROR_MESSAGE();
              RAISERROR(@ErrorMsg, 16, 1);
          END CATCH
      END
    python: |
      import pyodbc
      from dataclasses import dataclass
      from datetime import datetime


      @dataclass
      class SoftDeleteResult:
          deleted_count: int
          success: bool
          error_message: str | None = None


      def soft_delete_product(
          conn_str: str,
          product_id: int,
          deleted_by: str,
      ) -> SoftDeleteResult:
          """상품을 soft delete 처리하고 삭제 이력을 남깁니다."""

          with pyodbc.connect(conn_str) as conn:
              conn.autocommit = False
              cursor = conn.cursor()

              try:
                  now = datetime.now()

                  cursor.execute(
                      """
                      UPDATE Products
                      SET IsDeleted = 1,
                          DeletedBy = ?,
                          DeletedDate = ?
                      WHERE ProductID = ?
                        AND IsDeleted = 0
                      """,
                      deleted_by,
                      now,
                      product_id,
                  )
                  deleted_count = cursor.rowcount

                  if deleted_count == 0:
                      raise ValueError("삭제 가능한 상품이 존재하지 않습니다.")

                  cursor.execute(
                      """
                      INSERT INTO ProductDeleteLog
                          (ProductID, DeletedBy, DeletedDate)
                      VALUES (?, ?, ?)
                      """,
                      product_id,
                      deleted_by,
                      now,
                  )

                  conn.commit()
                  return SoftDeleteResult(deleted_count=deleted_count, success=True)

              except Exception as e:
                  conn.rollback()
                  return SoftDeleteResult(
                      deleted_count=0,
                      success=False,
                      error_message=str(e),
                  )

