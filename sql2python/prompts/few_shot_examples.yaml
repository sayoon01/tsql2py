  - tag: transaction_fixed_datetime
    sql: |
      CREATE PROCEDURE UpdateOrderStatus
          @OrderID INT,
          @NewStatus NVARCHAR(50),
          @UpdatedBy NVARCHAR(100),
          @UpdatedCount INT OUTPUT
      AS
      BEGIN
          SET NOCOUNT ON;
          DECLARE @OldStatus NVARCHAR(50);
          BEGIN TRY
              BEGIN TRANSACTION;
              SELECT @OldStatus = Status
              FROM Orders
              WHERE OrderID = @OrderID;
              IF @OldStatus IS NULL
              BEGIN
                  RAISERROR(N'해당 OrderID의 주문이 존재하지 않습니다.', 16, 1);
              END
              UPDATE Orders
              SET Status = @NewStatus,
                  ModifiedBy = @UpdatedBy,
                  ModifiedDate = GETDATE()
              WHERE OrderID = @OrderID;
              SET @UpdatedCount = @@ROWCOUNT;
              INSERT INTO OrderAuditLog
                  (OrderID, OldStatus, NewStatus, ChangedBy, ChangedDate)
              VALUES
                  (@OrderID, @OldStatus, @NewStatus, @UpdatedBy, GETDATE());
              COMMIT TRANSACTION;
          END TRY
          BEGIN CATCH
              IF @@TRANCOUNT > 0
                  ROLLBACK TRANSACTION;
              DECLARE @ErrorMsg NVARCHAR(4000) = ERROR_MESSAGE();
              RAISERROR(@ErrorMsg, 16, 1);
          END CATCH
      END
    python: |
      import pyodbc
      from dataclasses import dataclass
      from datetime import datetime


      @dataclass
      class UpdateResult:
          updated_count: int
          success: bool
          error_message: str | None = None


      def update_order_status(
          conn_str: str,
          order_id: int,
          new_status: str,
          updated_by: str,
      ) -> UpdateResult:
          """주문 상태를 변경하고 감사 로그를 기록합니다."""

          with pyodbc.connect(conn_str) as conn:
              conn.autocommit = False
              cursor = conn.cursor()

              try:
                  cursor.execute(
                      """
                      SELECT Status
                      FROM Orders
                      WHERE OrderID = ?
                      """,
                      order_id,
                  )
                  row = cursor.fetchone()

                  if row is None:
                      raise ValueError("해당 OrderID의 주문이 존재하지 않습니다.")

                  old_status = row[0]
                  now = datetime.now()

                  cursor.execute(
                      """
                      UPDATE Orders
                      SET Status = ?,
                          ModifiedBy = ?,
                          ModifiedDate = ?
                      WHERE OrderID = ?
                      """,
                      new_status,
                      updated_by,
                      now,
                      order_id,
                  )
                  updated_count = cursor.rowcount

                  cursor.execute(
                      """
                      INSERT INTO OrderAuditLog
                          (OrderID, OldStatus, NewStatus, ChangedBy, ChangedDate)
                      VALUES (?, ?, ?, ?, ?)
                      """,
                      order_id,
                      old_status,
                      new_status,
                      updated_by,
                      now,
                  )

                  conn.commit()
                  return UpdateResult(updated_count=updated_count, success=True)

              except Exception as e:
                  conn.rollback()
                  return UpdateResult(
                      updated_count=0,
                      success=False,
                      error_message=str(e),
                  )

  - tag: rowcount_chain_delete
    sql: |
      CREATE PROCEDURE dbo.DeleteUserAndProfile
          @UserID INT
      AS
      BEGIN
          BEGIN TRY
              BEGIN TRANSACTION;
              DELETE FROM UserProfiles WHERE UserID = @UserID;
              DELETE FROM Users WHERE UserID = @UserID;
              COMMIT TRANSACTION;
          END TRY
          BEGIN CATCH
              IF @@TRANCOUNT > 0
                  ROLLBACK TRANSACTION;
              RAISERROR(ERROR_MESSAGE(), 16, 1);
          END CATCH
      END
    python: |
      import pyodbc
      from dataclasses import dataclass


      @dataclass
      class DeleteUserResult:
          success: bool
          deleted_profile_count: int
          deleted_user_count: int
          error_message: str | None = None


      def delete_user_and_profile(
          conn_str: str,
          user_id: int,
      ) -> DeleteUserResult:
          """연쇄 DELETE에서는 rowcount를 즉시 저장하고 commit/rollback을 명시합니다."""

          with pyodbc.connect(conn_str) as conn:
              conn.autocommit = False
              cursor = conn.cursor()

              try:
                  cursor.execute(
                      "DELETE FROM UserProfiles WHERE UserID = ?",
                      user_id,
                  )
                  deleted_profile_count = cursor.rowcount

                  cursor.execute(
                      "DELETE FROM Users WHERE UserID = ?",
                      user_id,
                  )
                  deleted_user_count = cursor.rowcount

                  if deleted_user_count != 1:
                      conn.rollback()
                      return DeleteUserResult(
                          success=False,
                          deleted_profile_count=deleted_profile_count,
                          deleted_user_count=deleted_user_count,
                          error_message="user not deleted",
                      )

                  conn.commit()
                  return DeleteUserResult(
                      success=True,
                      deleted_profile_count=deleted_profile_count,
                      deleted_user_count=deleted_user_count,
                  )
              except Exception as e:
                  conn.rollback()
                  return DeleteUserResult(
                      success=False,
                      deleted_profile_count=0,
                      deleted_user_count=0,
                      error_message=str(e),
                  )

  - tag: no_error_query_try_except
    sql: |
      CREATE PROCEDURE dbo.UpdateStock
          @ProductID INT,
          @Qty INT
      AS
      BEGIN
          UPDATE Products
          SET StockQty = StockQty + @Qty
          WHERE ProductID = @ProductID;
          IF @@ERROR <> 0
              RETURN -1;
          RETURN 0;
      END
    python: |
      import pyodbc
      from dataclasses import dataclass


      @dataclass
      class UpdateStockResult:
          return_code: int
          success: bool
          error_message: str | None = None


      def update_stock(
          conn_str: str,
          product_id: int,
          qty: int,
      ) -> UpdateStockResult:
          """Python 예시에서는 @@ERROR 조회 대신 try/except를 사용합니다."""

          with pyodbc.connect(conn_str) as conn:
              conn.autocommit = False
              cursor = conn.cursor()

              try:
                  cursor.execute(
                      """
                      UPDATE Products
                      SET StockQty = StockQty + ?
                      WHERE ProductID = ?
                      """,
                      qty,
                      product_id,
                  )
                  conn.commit()
                  return UpdateStockResult(return_code=0, success=True)
              except Exception as e:
                  conn.rollback()
                  return UpdateStockResult(
                      return_code=-1,
                      success=False,
                      error_message=str(e),
                  )

