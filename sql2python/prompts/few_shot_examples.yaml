examples:
  - tag: simple_select
    sql: |
      CREATE PROCEDURE GetActiveUsers
          @MinAge INT = 18,
          @MaxResults INT = 100
      AS
      BEGIN
          SET NOCOUNT ON;
          SELECT TOP(@MaxResults) UserID, UserName, Email, Age
          FROM Users
          WHERE IsActive = 1
            AND Age >= @MinAge
          ORDER BY UserName;
      END
    python: |
      import pyodbc
      import pandas as pd


      def get_active_users(
          conn_str: str,
          min_age: int = 18,
          max_results: int = 100,
      ) -> pd.DataFrame:
          """활성 사용자 목록 조회"""

          query = """
              SELECT TOP(?) UserID, UserName, Email, Age
              FROM Users
              WHERE IsActive = 1
                AND Age >= ?
              ORDER BY UserName
          """

          with pyodbc.connect(conn_str) as conn:
              df = pd.read_sql(query, conn, params=[max_results, min_age])

          return df

  - tag: simple_dml_update
    sql: |
      CREATE PROCEDURE dbo.UpdateBookTitle
          @Isbn VARCHAR(13),
          @Title NVARCHAR(256)
      AS
      BEGIN
          SET NOCOUNT ON;
          UPDATE Books
          SET Title = @Title
          WHERE Isbn = @Isbn;
      END
    python: |
      import pyodbc
      from contextlib import closing
      from dataclasses import dataclass


      @dataclass
      class UpdateBookTitleResult:
          updated: bool
          error_message: str | None = None


      def update_book_title(
          conn_str: str,
          isbn: str,
          title: str,
      ) -> UpdateBookTitleResult:
          """ISBN으로 도서 제목을 수정합니다."""

          with pyodbc.connect(conn_str) as conn:
              conn.autocommit = False
              with closing(conn.cursor()) as cursor:
                  try:
                      cursor.execute(
                          """
                          UPDATE Books
                          SET Title = ?
                          WHERE Isbn = ?
                          """,
                          title,
                          isbn,
                      )
                      updated = cursor.rowcount > 0
                      conn.commit()
                      return UpdateBookTitleResult(updated=updated)
                  except Exception as e:
                      conn.rollback()
                      return UpdateBookTitleResult(
                          updated=False,
                          error_message=str(e),
                      )

